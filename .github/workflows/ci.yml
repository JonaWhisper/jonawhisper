name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Frontend (Node) ──────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx vue-tsc -b --noEmit

      - name: Tests
        run: npx vitest run

  # ── Rust check + clippy ──────────────────────────────
  rust-check:
    name: Rust Check
    runs-on: macos-26
    timeout-minutes: 30
    env:
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      CMAKE_TOOLCHAIN_FILE: ${{ github.workspace }}/src-tauri/cmake/arm-ggml-fix.cmake
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: macos-arm64
          cache-on-failure: true

      - name: Clippy (includes cargo check)
        working-directory: src-tauri
        run: cargo clippy --workspace -- -D warnings

  # ── Rust tests ───────────────────────────────────────
  rust-test:
    name: Rust Tests
    runs-on: macos-26
    timeout-minutes: 30
    env:
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      CMAKE_TOOLCHAIN_FILE: ${{ github.workspace }}/src-tauri/cmake/arm-ggml-fix.cmake
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: macos-arm64
          cache-on-failure: true

      - name: Tests
        working-directory: src-tauri
        run: cargo test --workspace
