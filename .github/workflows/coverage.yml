name: Coverage

on:
  pull_request:
    branches: [main]

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage:
    name: Test Coverage
    runs-on: macos-26
    timeout-minutes: 60
    env:
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      CMAKE_TOOLCHAIN_FILE: ${{ github.workspace }}/src-tauri/cmake/arm-ggml-fix.cmake

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: macos-arm64-cov
          cache-on-failure: true

      - name: Install dependencies
        run: |
          cargo install cargo-llvm-cov --locked
          npm ci

      # ── Current branch coverage ──────────────────────
      - name: Rust coverage (PR)
        working-directory: src-tauri
        run: cargo llvm-cov --workspace --lcov --output-path ../coverage-rust-pr.lcov

      - name: Frontend coverage (PR)
        run: npx vitest run --coverage
        # Generates coverage/lcov.info via v8 provider

      - name: Copy frontend lcov
        run: cp coverage/lcov.info coverage-frontend-pr.lcov

      # ── Base branch coverage ─────────────────────────
      - name: Base branch coverage
        run: |
          # Save PR coverage files
          cp coverage-rust-pr.lcov /tmp/coverage-rust-pr.lcov
          cp coverage-frontend-pr.lcov /tmp/coverage-frontend-pr.lcov

          git stash --include-untracked || true
          git checkout -- . || true
          git checkout ${{ github.event.pull_request.base.sha }}

          # Rust base
          cd src-tauri
          cargo llvm-cov --workspace --lcov --output-path ../coverage-rust-base.lcov 2>/dev/null || echo "LF:0" > ../coverage-rust-base.lcov
          cd ..

          # Frontend base
          npm ci --ignore-scripts 2>/dev/null || true
          npx vitest run --coverage 2>/dev/null && cp coverage/lcov.info coverage-frontend-base.lcov || echo "LF:0" > coverage-frontend-base.lcov

          git checkout -
          git stash pop || true

          # Restore PR coverage files
          cp /tmp/coverage-rust-pr.lcov coverage-rust-pr.lcov
          cp /tmp/coverage-frontend-pr.lcov coverage-frontend-pr.lcov

      # ── Report ───────────────────────────────────────
      - name: Generate report and comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash .github/scripts/coverage-report.sh \
            coverage-rust-base.lcov coverage-rust-pr.lcov \
            coverage-frontend-base.lcov coverage-frontend-pr.lcov

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: |
            coverage-rust-pr.lcov
            coverage-frontend-pr.lcov
          retention-days: 7
