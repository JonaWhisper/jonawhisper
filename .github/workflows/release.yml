name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: Dry run (no push, no release)
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  # ───────────────────────────────────────────────
  # Job 1: Bump version, generate changelog, tag
  # ───────────────────────────────────────────────
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          output=$(bash .github/scripts/bump-version.sh ${{ inputs.bump }})
          echo "$output"
          version=$(echo "$output" | grep '^version=' | cut -d= -f2)
          tag=$(echo "$output" | grep '^tag=' | cut -d= -f2)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Generate changelog (this release)
        uses: orhun/git-cliff-action@v4
        id: cliff-release
        with:
          config: cliff.toml
          args: --unreleased --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog (full history)
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag ${{ steps.bump.outputs.tag }}
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and tag
        if: ${{ inputs.dry_run == false }}
        run: |
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml CHANGELOG.md
          git commit -m "release: ${{ steps.bump.outputs.tag }}"
          git tag -a "${{ steps.bump.outputs.tag }}" -m "Release ${{ steps.bump.outputs.tag }}"
          git push origin main --follow-tags

      - name: Dry run summary
        if: ${{ inputs.dry_run == true }}
        run: |
          echo "### Dry Run Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version: ${{ steps.bump.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: ${{ steps.bump.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Changed files:" >> "$GITHUB_STEP_SUMMARY"
          git diff --name-only >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Release notes:" >> "$GITHUB_STEP_SUMMARY"
          cat CHANGES.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-meta
          path: CHANGES.md

  # ───────────────────────────────────────────────
  # Job 2: Build macOS (Apple Silicon)
  # ───────────────────────────────────────────────
  build-macos:
    name: Build macOS (aarch64)
    needs: prepare
    if: ${{ inputs.dry_run == false }}
    runs-on: macos-14
    timeout-minutes: 60
    env:
      MACOSX_DEPLOYMENT_TARGET: "13.0"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: release-macos-arm64
          cache-on-failure: true

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build --bundles app,dmg

      - name: Ad-hoc codesign
        run: codesign --force --deep --sign - "src-tauri/target/release/bundle/macos/JonaWhisper.app"

      - name: Package artifacts
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"

          # Rename DMG
          mv src-tauri/target/release/bundle/dmg/*.dmg \
            "JonaWhisper_${VERSION}_macos_aarch64.dmg"

          # Create ZIP of .app
          ditto -c -k --sequesterRsrc --keepParent \
            "src-tauri/target/release/bundle/macos/JonaWhisper.app" \
            "JonaWhisper_${VERSION}_macos_aarch64.app.zip"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-aarch64
          path: |
            JonaWhisper_*.dmg
            JonaWhisper_*.app.zip

  # ───────────────────────────────────────────────
  # Job 3: Build Windows (disabled)
  # ───────────────────────────────────────────────
  build-windows:
    name: Build Windows (x64)
    needs: prepare
    if: false # TODO: Enable when Windows support is ready
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - run: echo "Windows build not yet implemented"

  # ───────────────────────────────────────────────
  # Job 4: Create GitHub Release (draft)
  # ───────────────────────────────────────────────
  release:
    name: Create Release
    needs: [prepare, build-macos]
    if: ${{ inputs.dry_run == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-aarch64
          path: artifacts

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-meta

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: JonaWhisper v${{ needs.prepare.outputs.version }}
          body_path: CHANGES.md
          draft: true
          files: |
            artifacts/JonaWhisper_*.dmg
            artifacts/JonaWhisper_*.app.zip
