name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: Dry run (no push, no release)
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  # ───────────────────────────────────────────────
  # Job 0: Check which signing secrets are available
  # ───────────────────────────────────────────────
  check-secrets:
    name: Check Signing Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      has-macos-signing: ${{ steps.check.outputs.has-macos-signing }}
      has-windows-signing: ${{ steps.check.outputs.has-windows-signing }}
    steps:
      - name: Detect available secrets
        id: check
        run: |
          # macOS: need certificate + signing identity for codesign + notarization
          if [ -n "${{ secrets.APPLE_CERTIFICATE }}" ] && [ -n "${{ secrets.APPLE_SIGNING_IDENTITY }}" ]; then
            echo "has-macos-signing=true" >> "$GITHUB_OUTPUT"
            echo "✅ macOS signing secrets available"
          else
            echo "has-macos-signing=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ macOS signing secrets missing — build will be unsigned"
          fi

          # Windows: need Certum HSM credentials for EV code signing
          if [ -n "${{ secrets.CERTUM_OTP_URI }}" ] && [ -n "${{ secrets.CERTUM_PASSWORD }}" ]; then
            echo "has-windows-signing=true" >> "$GITHUB_OUTPUT"
            echo "✅ Windows signing secrets available"
          else
            echo "has-windows-signing=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ Windows signing secrets missing — build will be unsigned"
          fi

  # ───────────────────────────────────────────────
  # Job 1: Bump version, generate changelog, tag
  # ───────────────────────────────────────────────
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          output=$(bash .github/scripts/bump-version.sh ${{ inputs.bump }})
          echo "$output"
          version=$(echo "$output" | grep '^version=' | cut -d= -f2)
          tag=$(echo "$output" | grep '^tag=' | cut -d= -f2)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Generate changelog (this release)
        uses: orhun/git-cliff-action@v4
        id: cliff-release
        with:
          config: cliff.toml
          args: --unreleased --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog (full history)
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag ${{ steps.bump.outputs.tag }}
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and tag
        if: ${{ inputs.dry_run == false }}
        run: |
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml CHANGELOG.md
          git commit -m "release: ${{ steps.bump.outputs.tag }}"
          git tag -a "${{ steps.bump.outputs.tag }}" -m "Release ${{ steps.bump.outputs.tag }}"
          git push origin main --follow-tags

      - name: Dry run summary
        if: ${{ inputs.dry_run == true }}
        run: |
          echo "### Dry Run Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version: ${{ steps.bump.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: ${{ steps.bump.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Changed files:" >> "$GITHUB_STEP_SUMMARY"
          git diff --name-only >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Release notes:" >> "$GITHUB_STEP_SUMMARY"
          cat CHANGES.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release notes
        uses: actions/upload-artifact@v7
        with:
          name: release-meta
          path: CHANGES.md

  # ───────────────────────────────────────────────
  # Job 2: Build macOS (Apple Silicon)
  # Always builds, signing is conditional
  # ───────────────────────────────────────────────
  build-macos:
    name: Build macOS (aarch64)
    needs: [check-secrets, prepare]
    if: ${{ inputs.dry_run == false }}
    runs-on: macos-26
    timeout-minutes: 60
    env:
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      CMAKE_TOOLCHAIN_FILE: ${{ github.workspace }}/src-tauri/cmake/arm-ggml-fix.cmake
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: release-macos-arm64
          cache-on-failure: true

      - name: Install frontend dependencies
        run: npm ci

      # Inject signing env vars only when secrets are available
      - name: Setup Apple signing
        if: ${{ needs.check-secrets.outputs.has-macos-signing == 'true' }}
        run: |
          echo "APPLE_CERTIFICATE=${{ secrets.APPLE_CERTIFICATE }}" >> "$GITHUB_ENV"
          echo "APPLE_CERTIFICATE_PASSWORD=${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "APPLE_SIGNING_IDENTITY=${{ secrets.APPLE_SIGNING_IDENTITY }}" >> "$GITHUB_ENV"
          echo "APPLE_ID=${{ secrets.APPLE_ID }}" >> "$GITHUB_ENV"
          echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}" >> "$GITHUB_ENV"
          echo "✅ Apple signing configured"

      - name: Set updater endpoint for unsigned builds
        if: ${{ needs.check-secrets.outputs.has-macos-signing != 'true' }}
        run: |
          sed -i '' 's|/latest-stable\.json"|/latest-unstable.json"|' src-tauri/tauri.conf.json
          echo "⚠️ Updater endpoint switched to latest-unstable.json (unsigned build)"

      - name: Build Tauri app
        run: npx tauri build --bundles app,dmg

      - name: Signing status
        run: |
          if [ "${{ needs.check-secrets.outputs.has-macos-signing }}" == "true" ]; then
            echo "✅ Build signed + notarized" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ Build unsigned (Apple signing secrets not configured)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Package artifacts
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"

          mv src-tauri/target/release/bundle/dmg/*.dmg \
            "JonaWhisper_${VERSION}_macos_aarch64.dmg"

          ditto -c -k --sequesterRsrc --keepParent \
            "src-tauri/target/release/bundle/macos/JonaWhisper.app" \
            "JonaWhisper_${VERSION}_macos_aarch64.app.zip"

          # Updater artifacts (only exist if TAURI_SIGNING_PRIVATE_KEY is set)
          if [ -f src-tauri/target/release/bundle/macos/JonaWhisper.app.tar.gz ]; then
            cp src-tauri/target/release/bundle/macos/JonaWhisper.app.tar.gz \
              "JonaWhisper_${VERSION}_macos_aarch64.app.tar.gz"
            cp src-tauri/target/release/bundle/macos/JonaWhisper.app.tar.gz.sig \
              "JonaWhisper_${VERSION}_macos_aarch64.app.tar.gz.sig"
          fi

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-aarch64
          path: |
            JonaWhisper_*.dmg
            JonaWhisper_*.app.zip
            JonaWhisper_*.app.tar.gz
            JonaWhisper_*.app.tar.gz.sig

  # ───────────────────────────────────────────────
  # Job 3: Build Windows (x64)
  # Always builds, signing is conditional
  # ───────────────────────────────────────────────
  build-windows:
    name: Build Windows (x64)
    needs: [check-secrets, prepare]
    if: ${{ inputs.dry_run == false }}
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: release-windows-x64
          cache-on-failure: true

      - name: Install frontend dependencies
        run: npm ci

      # TODO: Setup Certum SimplySign when signing secrets are available
      # - name: Setup Certum HSM signing
      #   if: ${{ needs.check-secrets.outputs.has-windows-signing == 'true' }}
      #   run: |
      #     # Install SimplySign, generate TOTP, activate virtual smart card
      #     # Set certificateThumbprint dynamically

      - name: Set updater endpoint for unsigned builds
        if: ${{ needs.check-secrets.outputs.has-windows-signing != 'true' }}
        shell: pwsh
        run: |
          $conf = Get-Content src-tauri/tauri.conf.json -Raw
          $conf = $conf -replace '/latest-stable\.json"', '/latest-unstable.json"'
          Set-Content src-tauri/tauri.conf.json -Value $conf -NoNewline
          Write-Output "⚠️ Updater endpoint switched to latest-unstable.json (unsigned build)"

      - name: Build Tauri app
        run: npx tauri build --bundles nsis

      - name: Signing status
        shell: bash
        run: |
          if [ "${{ needs.check-secrets.outputs.has-windows-signing }}" == "true" ]; then
            echo "✅ Build signed with EV certificate" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ Build unsigned (Certum signing secrets not configured)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Package artifacts
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"

          # NSIS installer
          cp src-tauri/target/release/bundle/nsis/*.exe \
            "JonaWhisper_${VERSION}_windows_x64.exe"

          # Updater artifacts (only exist if TAURI_SIGNING_PRIVATE_KEY is set)
          if [ -f src-tauri/target/release/bundle/nsis/*.nsis.zip ]; then
            cp src-tauri/target/release/bundle/nsis/*.nsis.zip \
              "JonaWhisper_${VERSION}_windows_x64.nsis.zip"
            cp src-tauri/target/release/bundle/nsis/*.nsis.zip.sig \
              "JonaWhisper_${VERSION}_windows_x64.nsis.zip.sig"
          fi

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-x64
          path: |
            JonaWhisper_*.exe
            JonaWhisper_*.nsis.zip
            JonaWhisper_*.nsis.zip.sig

  # ───────────────────────────────────────────────
  # Job 4: Create GitHub Release (draft)
  # Runs if at least one build succeeded
  # ───────────────────────────────────────────────
  release:
    name: Create Release
    needs: [prepare, check-secrets, build-macos, build-windows]
    if: |
      always() &&
      inputs.dry_run == false &&
      (needs.build-macos.result == 'success' || needs.build-windows.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download macOS artifacts
        if: ${{ needs.build-macos.result == 'success' }}
        uses: actions/download-artifact@v8
        with:
          name: macos-aarch64
          path: artifacts

      - name: Download Windows artifacts
        if: ${{ needs.build-windows.result == 'success' }}
        uses: actions/download-artifact@v8
        with:
          name: windows-x64
          path: artifacts

      - name: Generate updater JSON files
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          BASE_URL="https://github.com/JonaWhisper/jonawhisper/releases/download/v${VERSION}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          HAS_MACOS_SIGNING="${{ needs.check-secrets.outputs.has-macos-signing }}"
          HAS_WINDOWS_SIGNING="${{ needs.check-secrets.outputs.has-windows-signing }}"

          SIGNED_PLATFORMS=""
          UNSIGNED_PLATFORMS=""

          # macOS platform (only if updater sig exists)
          if [ -f "artifacts/JonaWhisper_${VERSION}_macos_aarch64.app.tar.gz.sig" ]; then
            SIG=$(cat "artifacts/JonaWhisper_${VERSION}_macos_aarch64.app.tar.gz.sig")
            ENTRY="    \"darwin-aarch64\": { \"signature\": \"${SIG}\", \"url\": \"${BASE_URL}/JonaWhisper_${VERSION}_macos_aarch64.app.tar.gz\" }"
            if [ "$HAS_MACOS_SIGNING" == "true" ]; then
              SIGNED_PLATFORMS="${SIGNED_PLATFORMS}${ENTRY}"
            else
              UNSIGNED_PLATFORMS="${UNSIGNED_PLATFORMS}${ENTRY}"
            fi
          fi

          # Windows platform (only if updater sig exists)
          if [ -f "artifacts/JonaWhisper_${VERSION}_windows_x64.nsis.zip.sig" ]; then
            SIG=$(cat "artifacts/JonaWhisper_${VERSION}_windows_x64.nsis.zip.sig")
            ENTRY="    \"windows-x86_64\": { \"signature\": \"${SIG}\", \"url\": \"${BASE_URL}/JonaWhisper_${VERSION}_windows_x64.nsis.zip\" }"
            if [ "$HAS_WINDOWS_SIGNING" == "true" ]; then
              [ -n "$SIGNED_PLATFORMS" ] && SIGNED_PLATFORMS="${SIGNED_PLATFORMS},"$'\n'
              SIGNED_PLATFORMS="${SIGNED_PLATFORMS}${ENTRY}"
            else
              [ -n "$UNSIGNED_PLATFORMS" ] && UNSIGNED_PLATFORMS="${UNSIGNED_PLATFORMS},"$'\n'
              UNSIGNED_PLATFORMS="${UNSIGNED_PLATFORMS}${ENTRY}"
            fi
          fi

          # Generate latest-stable.json (signed/stable channel)
          if [ -n "$SIGNED_PLATFORMS" ]; then
            echo '{' > artifacts/latest-stable.json
            echo "  \"version\": \"${VERSION}\"," >> artifacts/latest-stable.json
            echo "  \"pub_date\": \"${PUB_DATE}\"," >> artifacts/latest-stable.json
            echo '  "platforms": {' >> artifacts/latest-stable.json
            echo "$SIGNED_PLATFORMS" >> artifacts/latest-stable.json
            echo '  }' >> artifacts/latest-stable.json
            echo '}' >> artifacts/latest-stable.json
            echo "✅ latest-stable.json generated with signed platforms"
          else
            echo "⚠️ No signed platforms — latest-stable.json not generated"
          fi

          # Generate latest-unstable.json (unsigned/dev channel)
          if [ -n "$UNSIGNED_PLATFORMS" ]; then
            echo '{' > artifacts/latest-unstable.json
            echo "  \"version\": \"${VERSION}\"," >> artifacts/latest-unstable.json
            echo "  \"pub_date\": \"${PUB_DATE}\"," >> artifacts/latest-unstable.json
            echo '  "platforms": {' >> artifacts/latest-unstable.json
            echo "$UNSIGNED_PLATFORMS" >> artifacts/latest-unstable.json
            echo '  }' >> artifacts/latest-unstable.json
            echo '}' >> artifacts/latest-unstable.json
            echo "✅ latest-unstable.json generated with unsigned platforms"
          else
            echo "⚠️ No unsigned platforms — latest-unstable.json not generated"
          fi

      - name: Download release notes
        uses: actions/download-artifact@v8
        with:
          name: release-meta

      - name: Build summary
        run: |
          echo "### Release Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Platform | Build | Signed |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| macOS (aarch64) | ${{ needs.build-macos.result }} | ${{ needs.check-secrets.outputs.has-macos-signing }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Windows (x64) | ${{ needs.build-windows.result }} | ${{ needs.check-secrets.outputs.has-windows-signing }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: JonaWhisper v${{ needs.prepare.outputs.version }}
          body_path: CHANGES.md
          draft: true
          files: |
            artifacts/JonaWhisper_*.dmg
            artifacts/JonaWhisper_*.app.zip
            artifacts/JonaWhisper_*.app.tar.gz
            artifacts/JonaWhisper_*.app.tar.gz.sig
            artifacts/JonaWhisper_*.exe
            artifacts/JonaWhisper_*.nsis.zip
            artifacts/JonaWhisper_*.nsis.zip.sig
            artifacts/latest-stable.json
            artifacts/latest-unstable.json
