[changelog]
header = """# Changelog\n
All notable changes to JonaWhisper will be documented in this file.\n"""
body = """
{% if version -%}
  ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
  ## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim }}
  {% for commit in commits %}
    - {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | split(pat="\n") | first | trim }}\
      {%- if commit.breaking %} **BREAKING**{% endif -%}
  {% endfor %}
{% endfor %}\n
"""
trim = true

[git]
conventional_commits = true
split_commits = false
protect_breaking_commits = true
commit_parsers = [
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^refactor", group = "Refactored" },
  { message = "^perf", group = "Performance" },
  { message = "^docs", group = "Documentation" },
  { message = "^style", group = "Style" },
  { message = "^test", group = "Testing" },
  { message = "^chore", group = "Chore" },
  { message = "^revert", group = "Reverted" },
  { message = "^release:", skip = true },
  # Legacy commits (before conventional commits adoption)
  { message = "^[Aa]dd |^[Ii]mplement |^[Cc]reate |^[Ii]ntegrate ", group = "Added" },
  { message = "^[Ff]ix ", group = "Fixed" },
  { message = "^[Uu]pdate |^[Ii]mprove |^[Rr]eplace |^[Rr]ename |^[Bb]ump ", group = "Changed" },
  { message = "^[Rr]efactor |^[Ee]xtract |^[Ss]implify |^[Mm]ove ", group = "Refactored" },
  { message = "^[Rr]emove |^[Cc]lean ", group = "Removed" },
  { message = ".*", group = "Other" },
]
tag_pattern = "v[0-9].*"
sort_commits = "newest"
