[changelog]
header = """# Changelog\n
All notable changes to WhisperDictate will be documented in this file.\n"""
body = """
{%- macro remote_url() -%}
  https://github.com/jphMusic/WhisperDictate
{%- endmacro -%}

{% if version -%}
  ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
  ## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim }}
  {% for commit in commits %}
    - {{ commit.message | split(pat="\n") | first | trim }}\
      {%- if commit.breaking %} **BREAKING**{% endif -%}
  {% endfor %}
{% endfor %}\n
"""
trim = true

[git]
conventional_commits = false
split_commits = false
commit_parsers = [
  { message = "^[Aa]dd |^[Ii]mplement |^[Cc]reate |^[Ii]ntegrate |^[Ii]ntroduce ", group = "### Added" },
  { message = "^[Ff]ix ", group = "### Fixed" },
  { message = "^[Uu]pdate |^[Ii]mprove |^[Rr]eplace |^[Rr]ename |^[Cc]hange |^[Ss]witch |^[Bb]ump ", group = "### Changed" },
  { message = "^[Rr]efactor |^[Rr]eorganize |^[Ee]xtract |^[Ss]implify |^[Mm]ove ", group = "### Refactored" },
  { message = "^[Rr]emove |^[Cc]lean ", group = "### Removed" },
  { message = "^UI |^[Cc]olor |^[Ss]how |^[Kk]eycap |^[Ss]tyle |^[Mm]ark ", group = "### UI" },
  { message = "^release:", skip = true },
  { message = ".*", group = "### Other" },
]
tag_pattern = "v[0-9].*"
sort_commits = "newest"
